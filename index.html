<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ULTRA TEAM F1 🏎️</title>

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: #00ffcc;
    overflow: hidden;
    text-align: center;
    touch-action: manipulation;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.8em;
    z-index: 5;
}

.fade {
    animation: fadeOut 1.5s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

.tip {
    font-size: 0.6em;
    margin-top: 20px;
    opacity: 0.7;
}

/* CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* HUD */
.hud {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 2;
}

.progress {
    width: 150px;
    height: 8px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* TEXTO */
.story {
    position: relative;
    margin-top: 100px;
    padding: 15px;
    font-size: 1.4em;
    z-index: 2;
    text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
}

/* BOTONES */
#opciones {
    position: relative;
    z-index: 2;
}

button {
    margin: 8px;
    padding: 14px 18px;
    border: 2px solid #00ffcc;
    border-radius: 25px;
    background: transparent;
    color: #00ffcc;
    font-weight: bold;
    font-size: 1em;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
    background: #00ffcc;
    color: black;
}

/* AUTO */
.car {
    position: fixed;
    bottom: 50px;
    left: -150px;
    font-size: 50px;
    z-index: 1;
}

.run {
    animation: correr 1.5s linear;
}

@keyframes correr {
    0% { left: -150px; }
    100% { left: 110%; }
}

/* LOGRO */
.logro {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.8);
    padding: 8px;
    border: 1px solid #00ffcc;
    border-radius: 10px;
    display: none;
    z-index: 3;
}
</style>
</head>

<body>

<div class="intro" id="intro">
INICIANDO SISTEMA... 🏎️
<div class="tip">Toca la pantalla para comenzar</div>
</div>

<canvas id="bg"></canvas>

<div class="hud">
🏁 Nivel: <span id="nivel">1</span>
<div class="progress"><div class="bar" id="barra"></div></div>
</div>

<div class="car" id="car">🏎️</div>

<div class="story" id="historia">Toca para iniciar...</div>

<div id="opciones"></div>

<div class="logro" id="logro"></div>

<script>
// INICIO POR TOQUE (CLAVE PARA CELULAR)
document.body.addEventListener("click", iniciar, { once: true });

function iniciar(){
    document.getElementById("intro").classList.add("fade");

    // intentar fullscreen solo después de interacción
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen().catch(()=>{});
    }

    setTimeout(()=>escena1(),1500);
}

// FONDO
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
for(let i=0;i<120;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2});
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ffcc";
    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,s.size,s.size);
        s.y+=2 + nivel*0.4;
        if(s.y>canvas.height)s.y=0;
    });
    requestAnimationFrame(draw);
}
draw();

// VARIABLES
let nivel=1;
let secretos=0;

const mensajes = [
"Su amistad vale más que cualquier cantidad de dinero 💸",
"El mundo es mucho mejor con ustedes 🌍",
"Son mi lugar seguro ❤️",
"Nada supera lo que somos juntos 🏎️"
];

function randomMsg(){
    return mensajes[Math.floor(Math.random()*mensajes.length)];
}

// HUD
function updateHUD(){
    document.getElementById("nivel").innerText=nivel;
    document.getElementById("barra").style.width=(nivel*20)+"%";
}

// VIBRACIÓN (CELULAR PRO)
function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate(50);
    }
}

// LOGRO
function mostrarLogro(txt){
    let l=document.getElementById("logro");
    l.innerText="🏆 "+txt;
    l.style.display="block";
    setTimeout(()=>l.style.display="none",1500);
}

// ESCENAS
function escena1(){
    nivel=1;
    updateHUD();
    mostrarLogro("Inicio del equipo");

    historia("Zian, Carlos, Gael y Luis...\n\nUn equipo legendario 🏎️🔥\n\n"+randomMsg());

    opciones([
        ["Carrera 🏁", escena2],
        ["Dinero 💸", escenaMoney]
    ]);
}

function escena2(){
    nivel++;
    updateHUD();
    correr();

    historia("La pista está ardiendo 🔥\n\n"+randomMsg());

    opciones([
        ["Acelerar 🚀", escenaWin],
        ["Explorar 🌍", escenaViaje]
    ]);
}

function escenaMoney(){
    nivel++;
    updateHUD();
    mostrarLogro("Riqueza desbloqueada");

    historia("El dinero cae... pero ustedes valen más 💸\n\n"+randomMsg());

    opciones([
        ["Viajar ✈️", escenaViaje],
        ["Carrera 🏎️", escena2]
    ]);
}

function escenaViaje(){
    nivel++;
    updateHUD();

    historia("Viajes infinitos ✈️🌍\n\n"+randomMsg());

    opciones([
        ["Final ❤️", final],
        ["Seguir 🏎️", escena2]
    ]);
}

function escenaWin(){
    nivel++;
    updateHUD();
    correr();
    mostrarLogro("Victoria total 🏆");
    secretos++;

    historia("Ganaron todo 🔥\n\n"+randomMsg());

    opciones([
        ["Final ❤️", final],
        ["Dinero 💸", escenaMoney]
    ]);
}

// FINAL
function final(){
    nivel++;
    updateHUD();

    let mensaje =
"Zian, Carlos, Gael y Luis...\n\nGracias por existir.\nMe hacen sentir la persona más afortunada del mundo.\nLos adoro, los admiro y los amo ❤️🏎️";

    if(secretos>=2){
        mensaje += "\n\n🔐 Nunca quiero perderlos, de verdad.";
    }

    if(secretos>=3){
        mensaje += "\n\n💎 Son mi familia elegida.";
    }

    historia(mensaje);

    opciones([
        ["Reiniciar 🔄", escena1]
    ]);
}

// FUNCIONES
function historia(txt){
    document.getElementById("historia").innerText=txt;
}

function opciones(lista){
    let c=document.getElementById("opciones");
    c.innerHTML="";
    lista.forEach(op=>{
        let b=document.createElement("button");
        b.innerText=op[0];
        b.onclick=()=>{
            vibrar();
            op[1]();
        };
        c.appendChild(b);
    });
}

function correr(){
    let car=document.getElementById("car");
    car.classList.add("run");
    setTimeout(()=>car.classList.remove("run"),1500);
}
</script>

</body>
</html>
